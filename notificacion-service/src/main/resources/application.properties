server.port=8084
spring.application.name=notificacion-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/notific_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sisexp}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
spring.jackson.serialization.fail-on-empty-beans=false
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.rabbit.enabled=true
