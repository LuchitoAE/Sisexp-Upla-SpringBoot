server.port=8081
spring.application.name=auth-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sisexp}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
jwt.secret=${JWT_SECRET:SisexpJwtSecret2026MicroservicesKey!}
jwt.expiration=${JWT_EXPIRATION:86400000}
spring.jackson.serialization.fail-on-empty-beans=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
