server.port=8083
spring.application.name=expediente-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/expediente_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sisexp}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.jackson.serialization.fail-on-empty-beans=false
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
jwt.secret=${JWT_SECRET:SisexpJwtSecret2026MicroservicesKey!}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.rabbit.enabled=true
