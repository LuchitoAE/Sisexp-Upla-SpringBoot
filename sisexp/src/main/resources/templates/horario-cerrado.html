<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario no disponible — SISEXP-UPLA</title>
    <link th:href="@{/vendor/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/vendor/bootstrap-icons.css}" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0ea5e9;
            --color-primary-dark: #0284c7;
            --shadow-login: 0 20px 60px rgba(0,0,0,.3);
            --radius-lg: 1rem;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-login);
            text-align: center;
            animation: fadeUp .5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .card { animation: none; }
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #fef3c7;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #d97706;
            margin-bottom: 1.25rem;
        }
        h4 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: .5rem;
        }
        p {
            color: #64748b;
            margin-bottom: 1.5rem;
            font-size: .9rem;
            line-height: 1.5;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            border: none;
            border-radius: 8px;
            padding: .6rem 1.5rem;
            font-weight: 600;
            transition: opacity .2s;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--color-primary-dark), #0369a1);
            color: white;
        }
        .horario-bar {
            background: #0f172a;
            border-radius: 10px;
            padding: .75rem 1rem;
            margin-top: 1.5rem;
        }
        .horario-bar .h {
            display: inline-block;
            width: 32px;
            height: 6px;
            border-radius: 3px;
            margin: 0 1px;
        }
        .horario-bar .h.on { background: #22c55e; }
        .horario-bar .h.off { background: #e2e8f0; }
        .horario-bar .h.now { box-shadow: 0 0 0 2px white, 0 0 0 4px var(--color-primary); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="bi bi-moon-stars"></i></div>
        <h4>Sistema no disponible</h4>
        <p>El horario de atenci&oacute;n es de <strong>8:00 AM a 8:00 PM</strong> (hora Per&uacute;).<br>
        Vuelva a intentarlo en horario laboral.</p>

        <div class="horario-bar mb-3" id="hoursBar"></div>
        <small class="text-muted d-block mb-3">
            <i class="bi bi-circle-fill text-success fs-85"></i> Disponible
            <i class="bi bi-circle-fill text-secondary ms-2 fs-85"></i> No disponible
        </small>
        <script>
            (function() {
                var bar = document.getElementById('hoursBar');
                var now = new Date().getHours();
                for (var h = 6; h <= 22; h++) {
                    var span = document.createElement('span');
                    span.className = 'h';
                    if (h >= 8 && h < 20) span.classList.add('on');
                    else span.classList.add('off');
                    if (h === now) span.classList.add('now');
                    span.title = h + ':00';
                    bar.appendChild(span);
                }
            })();
        </script>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesi&oacute;n
            </button>
        </form>
    </div>
</body>
</html>
