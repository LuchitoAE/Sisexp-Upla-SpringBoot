<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Necesidades PAP — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-card-list me-2 text-primary"></i>Necesidades PAP
            </h4>
            <small class="text-muted">Plan Anual de Contrataciones</small>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalPAP"
                sec:authorize="hasAnyRole('Administrador','Coordinacion')" onclick="resetPAPForm()">
            <i class="bi bi-plus-lg"></i> Nueva necesidad
        </button>
    </div>

    <th:block th:if="${success}">
        <div class="alert alert-success alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}">OK</span>
        </div>
    </th:block>
    <th:block th:if="${error}">
        <div class="alert alert-danger alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}">Error</span>
        </div>
    </th:block>

    <div class="table-card">
        <div class="card-header">
            <h5><i class="bi bi-list"></i>Listado</h5>
            <form class="d-flex gap-2" th:action="@{/necesidades}" method="get">
                <select class="form-select form-select-sm" style="min-width:220px" name="actividadId"
                        onchange="this.form.submit()">
                    <option value="">Todas las actividades</option>
                    <option th:each="a : ${actividades}" th:value="${a.id}"
                            th:selected="${actividadSeleccionada != null && actividadSeleccionada.equals(a.id)}"
                            th:text="${a.codigo} + ' — ' + ${a.nombre}">POI</option>
                </select>
            </form>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Actividad POI</th>
                        <th class="text-end">Cant.</th>
                        <th class="text-end">P. Unit.</th>
                        <th>Tipo</th>
                        <th class="text-end">Disp.</th>
                        <th class="text-end">Ejec.</th>
                        <th class="text-end">Monto Disp.</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="n : ${necesidades}">
                        <td>
                            <div class="fw-medium" th:text="${n.nombre}">Nombre del item</div>
                        </td>
                        <td class="small" th:text="${n.actividadPOI != null ? n.actividadPOI.codigo : ''}">POI-2.01</td>
                        <td class="text-end" th:text="${n.cantidad}">0</td>
                        <td class="text-end"
                            th:text="'S/ ' + ${#numbers.formatDecimal(n.precioEstimado, 0, 'COMMA', 2, 'POINT')}">0</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${n.tipo.name() == 'BIEN' or n.tipo.name() == 'Bien'} ? 'bg-primary' : 'bg-info text-dark'"
                                  th:text="${n.tipo}">Bien</span>
                        </td>
                        <td class="text-end" th:text="${n.cantidadDisponible}">0</td>
                        <td class="text-end text-success" th:text="${n.cantidadEjecutada}">0</td>
                        <td class="text-end fw-medium"
                            th:text="'S/ ' + ${#numbers.formatDecimal(n.montoDisponible, 0, 'COMMA', 2, 'POINT')}">0</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm" title="Editar"
                                    sec:authorize="hasAnyRole('Administrador','Coordinacion')"
                                    data-bs-toggle="modal" data-bs-target="#modalPAP"
                                    th:attr="data-id=${n.id}, data-nombre=${n.nombre}, data-cantidad=${n.cantidad},
                                              data-precio=${n.precioEstimado}, data-unidad=${n.unidad},
                                              data-tipo=${n.tipo}, data-clasificador=${n.clasificadorGasto}">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(necesidades)}">
                        <td colspan="9" class="text-center text-muted py-5">
                            <i class="bi bi-card-list fs-1 d-block mb-2"></i>
                            <p class="mb-2">No hay necesidades PAP registradas</p>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalPAP"
                                    sec:authorize="hasAnyRole('Administrador','Coordinacion')" onclick="resetPAPForm()">
                                <i class="bi bi-plus-lg"></i> Crear primero
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalPAP" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/necesidades}" method="post" id="formPAP">
                    <div class="modal-header">
                        <h6 class="modal-title" id="modalPAPTitle">
                            <i class="bi bi-card-list me-2 text-primary"></i>Nueva Necesidad
                        </h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="papId">
                        <div class="mb-3">
                            <label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input class="form-control" name="nombre" id="papNombre" required
                                   placeholder="Nombre del item">
                        </div>
                        <div class="row mb-3">
                            <div class="col-4">
                                <label class="form-label">Cantidad <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="cantidad" id="papCantidad" required min="1">
                            </div>
                            <div class="col-4">
                                <label class="form-label">Precio Unit. (S/) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="precioEstimado" id="papPrecio"
                                       required min="0" step="0.01" placeholder="0.00">
                            </div>
                            <div class="col-4">
                                <label class="form-label">Unidad</label>
                                <input class="form-control" name="unidad" id="papUnidad" placeholder="Ej: unidad, kg, lote">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" name="tipo" id="papTipo">
                                    <option th:each="t : ${naturalezas}" th:value="${t}" th:text="${t}">Bien</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Clasificador de gasto</label>
                                <input class="form-control" name="clasificadorGasto" id="papClasificador"
                                       placeholder="Ej: 2.3.1.1.1">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Actividad POI <span class="text-danger">*</span></label>
                            <select class="form-select" name="actividadPoiId" required>
                                <option value="">Seleccionar actividad...</option>
                                <option th:each="a : ${actividades}" th:value="${a.id}"
                                        th:text="${a.codigo} + ' — ' + ${a.nombre}">POI-2.01</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-save"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function resetPAPForm() {
            document.getElementById('formPAP').reset();
            document.getElementById('formPAP').action = '/necesidades';
            document.getElementById('modalPAPTitle').innerHTML = '<i class="bi bi-card-list me-2 text-primary"></i> Nueva Necesidad';
        }
        document.getElementById('modalPAP').addEventListener('show.bs.modal', function(e) {
            var btn = e.relatedTarget;
            if (!btn) return;
            var id = btn.getAttribute('data-id');
            if (!id) return;
            document.getElementById('formPAP').action = '/necesidades/' + id + '/editar';
            document.getElementById('modalPAPTitle').innerHTML = '<i class="bi bi-pencil me-2 text-primary"></i> Editar Necesidad';
            document.getElementById('papNombre').value = btn.getAttribute('data-nombre');
            document.getElementById('papCantidad').value = btn.getAttribute('data-cantidad');
            document.getElementById('papPrecio').value = btn.getAttribute('data-precio');
            document.getElementById('papUnidad').value = btn.getAttribute('data-unidad');
            document.getElementById('papTipo').value = btn.getAttribute('data-tipo');
            document.getElementById('papClasificador').value = btn.getAttribute('data-clasificador');
        });
    </script>

</div>
</body>
</html>
