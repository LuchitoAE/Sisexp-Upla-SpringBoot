<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Usuarios — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-people me-2 text-primary"></i>Usuarios
            </h4>
            <small class="text-muted">Administraci&oacute;n de cuentas</small>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalUsuario" onclick="resetUserForm()">
            <i class="bi bi-plus-lg"></i> Nuevo usuario
        </button>
    </div>

    <th:block th:if="${success}">
        <div class="alert alert-success alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}">OK</span>
        </div>
    </th:block>
    <th:block th:if="${error}">
        <div class="alert alert-danger alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}">Error</span>
        </div>
    </th:block>

    <style>
        .rol-Administrador{background:#dc2626;color:white}
        .rol-Coordinacion{background:#2563eb;color:white}
        .rol-Secretaria{background:#7c3aed;color:white}
        .rol-Director{background:#0891b2;color:white}
        .rol-Laboratorio{background:#d97706;color:white}
        .rol-Decanato{background:#64748b;color:white}
    </style>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Horario</th>
                        <th>Activo</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td class="fw-medium" th:text="${u.nombre}">Nombre</td>
                        <td class="small text-muted" th:text="${u.email}">email@upla.edu.pe</td>
                        <td><span class="badge" th:class="'rol-' + ${u.rol}" th:text="${u.rol}">Admin</span></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.horarioRestringido} ? 'bg-info text-dark' : 'bg-success'"
                                  th:text="${u.horarioRestringido} ? 'Restringido' : 'Bypass 24/7'">Restringido</span>
                        </td>
                        <td>
                            <form th:action="@{/usuarios/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${u.activo} ? 'btn-success' : 'btn-secondary'"
                                        th:text="${u.activo} ? 'ON' : 'OFF'"
                                        style="font-size:.7rem;min-width:42px;font-weight:600">ON</button>
                            </form>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-1" title="Editar"
                                    data-bs-toggle="modal" data-bs-target="#modalUsuario"
                                    th:attr="data-id=${u.id}, data-nombre=${u.nombre}, data-email=${u.email},
                                              data-rol=${u.rol}, data-horario=${u.horarioRestringido}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-sm" title="Cambiar contrase&ntilde;a"
                                    data-bs-toggle="modal" data-bs-target="#modalPassword"
                                    th:attr="data-id=${u.id}">
                                <i class="bi bi-key"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(usuarios)}" class="text-center text-muted py-5">
        <i class="bi bi-people fs-1 d-block mb-2"></i>
        <p class="mb-2">No hay usuarios registrados</p>
    </div>

    <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/usuarios}" method="post" id="formUsuario">
                    <div class="modal-header">
                        <h6 class="modal-title" id="modalUserTitle">
                            <i class="bi bi-person-plus me-2 text-primary"></i>Nuevo Usuario
                        </h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="userId">
                        <div class="mb-3">
                            <label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input class="form-control" name="nombre" id="userNombre" required
                                   placeholder="Nombre completo">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" name="email" id="userEmail" required
                                   placeholder="usuario@upla.edu.pe">
                        </div>
                        <div class="mb-3" id="divPassword">
                            <label class="form-label">Contrase&ntilde;a <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="password" minlength="4"
                                   placeholder="M&iacute;nimo 4 caracteres">
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Rol</label>
                                <select class="form-select" name="rol" id="userRol">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">Admin</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Horario laboral</label>
                                <select class="form-select" name="horarioRestringido" id="userHorario">
                                    <option value="true">Restringido (8am-8pm)</option>
                                    <option value="false">Bypass 24/7</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-save"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPassword" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <form th:action="@{/usuarios/0/password}" method="post" id="formPassword">
                    <div class="modal-header">
                        <h6 class="modal-title"><i class="bi bi-key me-2 text-warning"></i>Cambiar Contrase&ntilde;a</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="passUserId" name="userId">
                        <label class="form-label">Nueva contrase&ntilde;a</label>
                        <input type="password" class="form-control" name="nuevaPassword" required minlength="4"
                               placeholder="M&iacute;nimo 4 caracteres">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning btn-sm"><i class="bi bi-key"></i> Cambiar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function resetUserForm() {
            document.getElementById('formUsuario').action = '/usuarios';
            document.getElementById('modalUserTitle').innerHTML = '<i class="bi bi-person-plus me-2 text-primary"></i> Nuevo Usuario';
            document.getElementById('divPassword').style.display = '';
            document.getElementById('formUsuario').reset();
        }

        document.getElementById('modalUsuario').addEventListener('show.bs.modal', function(e) {
            var btn = e.relatedTarget;
            if (!btn) return;
            var id = btn.getAttribute('data-id');
            if (!id) return;
            document.getElementById('formUsuario').action = '/usuarios/' + id + '/editar';
            document.getElementById('modalUserTitle').innerHTML = '<i class="bi bi-pencil me-2 text-primary"></i> Editar Usuario';
            document.getElementById('userId').value = id;
            document.getElementById('userNombre').value = btn.getAttribute('data-nombre');
            document.getElementById('userEmail').value = btn.getAttribute('data-email');
            document.getElementById('userRol').value = btn.getAttribute('data-rol');
            document.getElementById('userHorario').value = btn.getAttribute('data-horario') === 'true' ? 'true' : 'false';
            document.getElementById('divPassword').style.display = 'none';
        });

        document.getElementById('modalPassword').addEventListener('show.bs.modal', function(e) {
            var btn = e.relatedTarget;
            if (!btn) return;
            var userId = btn.getAttribute('data-id');
            document.getElementById('formPassword').action = '/usuarios/' + userId + '/password';
            document.getElementById('passUserId').value = userId;
        });
    </script>

</div>
</body>
</html>
