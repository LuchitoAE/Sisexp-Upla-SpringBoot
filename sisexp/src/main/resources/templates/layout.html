<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'SISEXP-UPLA'">SISEXP-UPLA</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link th:href="@{/vendor/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/vendor/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/sisexp.css}" rel="stylesheet">
</head>
<body>
    <th:block th:fragment="layout(content)">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
            <i class="bi bi-list"></i>
        </button>
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="main">
            <div th:replace="~{fragments/header :: header}"></div>
            <div class="content" id="main-content">
                <th:block th:replace="${content}"></th:block>
            </div>
        </div>

        <div th:replace="~{fragments/scripts :: scripts}"></div>
    </th:block>
</body>
</html>
