<header class="topbar" th:fragment="header">
    <div class="d-flex align-items-center w-100">
        <div class="d-flex align-items-center gap-2">
            <span class="d-none d-md-inline text-muted small">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">usuario@upla.edu.pe</span>
            </span>
            <span class="role-badge"
                  th:text="${#strings.replace(
                      #authentication?.authorities?.iterator()?.next()?.authority ?: '',
                      'ROLE_', '')}">
                Rol
            </span>
        </div>

        <div class="ms-auto d-flex align-items-center gap-3">
            <a th:href="@{/notificaciones}" class="notif-icon position-relative text-decoration-none">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      id="notif-badge" style="display:none; font-size:.6rem; min-width:18px">
                </span>
            </a>

            <form th:action="@{/logout}" method="post" class="d-none d-md-inline">
                <button type="submit" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </form>
        </div>
    </div>
</header>
