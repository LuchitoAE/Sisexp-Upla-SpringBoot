<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Expedientes — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-file-earmark-text me-2 text-primary"></i>Expedientes
            </h4>
            <small class="text-muted" th:text="'Total: ' + ${#lists.size(expedientes)} + ' registros'">Total: 0</small>
        </div>
        <a th:href="@{/expedientes/nuevo}"
           class="btn btn-primary btn-sm"
           sec:authorize="hasAnyRole('Administrador','Coordinacion','Secretaria','Director','Laboratorio')">
            <i class="bi bi-plus-lg"></i> Nuevo expediente
        </a>
    </div>

    <th:block th:if="${success}">
        <div class="alert alert-success alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}">OK</span>
        </div>
    </th:block>
    <th:block th:if="${error}">
        <div class="alert alert-danger alert-auto-close d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}">Error</span>
        </div>
    </th:block>

    <div class="table-card">
        <div class="card-header">
            <h5><i class="bi bi-list"></i>Listado</h5>
            <div class="d-flex gap-2">
                <select class="form-select form-select-sm" style="min-width:150px" id="filterEstado"
                        onchange="filtrarEstadoDataset('filterEstado','expTable','data-estado')">
                    <option value="">Todos los estados</option>
                    <option th:each="e : ${estados}" th:value="${e.name()}" th:text="${e.name().replace('_',' ')}">Estado</option>
                </select>
                <input type="text" class="form-control form-control-sm" style="min-width:200px"
                       placeholder="Buscar c&oacute;digo..." id="filterSearch" onkeyup="filtrarTablaCodigo('filterSearch','expTable')">
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="expTable">
                <thead class="table-light">
                    <tr>
                        <th>C&oacute;digo</th>
                        <th>Actividad POI</th>
                        <th>Item PAP</th>
                        <th>Solicitante</th>
                        <th>Urgencia</th>
                        <th>Estado</th>
                        <th>F. L&iacute;mite</th>
                        <th class="text-end">Costo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exp : ${expedientes}" th:attr="data-estado=${exp.estado.name()}">
                        <td class="fw-medium">
                            <a th:href="@{/expedientes/{id}(id=${exp.id})}" class="text-decoration-none" th:text="${exp.codigo}">EXP-2026-0001</a>
                        </td>
                        <td>
                            <span class="badge bg-light text-dark border fs-85" th:text="${exp.actividadPOI.codigo}">POI</span>
                            <div class="small text-muted mt-1" th:text="${exp.actividadPOI.nombre}">Nombre</div>
                        </td>
                        <td class="small" th:text="${exp.necesidadPAP.nombre}">Item</td>
                        <td class="small" th:text="${exp.solicitante.nombre}">Solicitante</td>
                        <td>
                            <span class="badge" th:classappend="'badge-' + ${exp.urgencia.name()}"
                                  th:text="${exp.urgencia.name().replace('_',' ')}">Normal</span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="'badge-' + ${exp.estado.name()}"
                                  th:text="${exp.estado.name().replace('_',' ')}">Borrador</span>
                        </td>
                        <td class="small" th:text="${exp.fechaLimite != null ? #temporals.format(exp.fechaLimite, 'dd/MM/yyyy') : '—'}">—</td>
                        <td class="text-end fw-medium"
                            th:text="'S/ ' + ${#numbers.formatDecimal(exp.costoEstimado, 0, 'COMMA', 2, 'POINT')}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(expedientes)}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            <p class="mb-2">No hay expedientes registrados</p>
                            <a th:href="@{/expedientes/nuevo}" class="btn btn-primary btn-sm"
                               sec:authorize="hasAnyRole('Administrador','Coordinacion','Secretaria','Director','Laboratorio')">
                                <i class="bi bi-plus-lg"></i> Crear primero
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
