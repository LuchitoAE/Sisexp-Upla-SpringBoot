<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Nuevo Expediente — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="mb-3">
        <a th:href="@{/expedientes}" class="text-decoration-none small text-muted">
            <i class="bi bi-arrow-left"></i> Volver a expedientes
        </a>
        <h4 class="fw-bold mb-0 mt-2">
            <i class="bi bi-file-earmark-plus me-2 text-primary"></i>Nuevo Expediente
        </h4>
        <small class="text-muted">Complete los datos para crear un nuevo expediente</small>
    </div>

    <div class="form-card">
        <form th:action="@{/expedientes}" method="post" th:object="${formDTO}" id="expForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">
                    Actividad POI <span class="text-danger">*</span>
                </label>
                <select class="form-select" th:field="*{actividadPoiId}" id="actividadPoiId"
                        onchange="cargarNecesidades()"
                        th:classappend="${#fields.hasErrors('actividadPoiId')} ? 'is-invalid' : ''">
                    <option value="">Seleccione una actividad</option>
                    <option th:each="a : ${actividades}" th:value="${a.id}"
                            th:text="${a.codigo + ' — ' + a.nombre}">POI-2.01 — Nombre</option>
                </select>
                <div th:if="${#fields.hasErrors('actividadPoiId')}" class="invalid-feedback">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{actividadPoiId}">Error</span>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label">
                    Item PAP <span class="text-danger">*</span>
                </label>
                <select class="form-select" th:field="*{necesidadPapId}" id="necesidadPapId"
                        onchange="actualizarInfoPAP()"
                        th:classappend="${#fields.hasErrors('necesidadPapId')} ? 'is-invalid' : ''">
                    <option value="">Primero seleccione una actividad</option>
                </select>
                <div th:if="${#fields.hasErrors('necesidadPapId')}" class="invalid-feedback">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{necesidadPapId}">Error</span>
                </div>
                <small class="text-muted" id="disponibleInfo"></small>
            </div>

            <div class="col-md-4">
                <label class="form-label">
                    Urgencia <span class="text-danger">*</span>
                </label>
                <select class="form-select" th:field="*{urgencia}">
                    <option value="">Seleccione</option>
                    <option th:each="u : ${urgencias}" th:value="${u}" th:text="${u}">Urgente</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Naturaleza</label>
                <select class="form-select" th:field="*{naturaleza}" id="naturaleza">
                    <option value="">Seleccione</option>
                    <option th:each="n : ${naturalezas}" th:value="${n}" th:text="${n}">Bien</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Fecha l&iacute;mite sugerida</label>
                <input type="date" class="form-control" th:field="*{fechaLimite}">
            </div>

            <div class="col-md-3">
                <label class="form-label">
                    Cantidad <span class="text-danger">*</span>
                </label>
                <input type="number" class="form-control" th:field="*{cantidadSolicitada}"
                       min="1" max="9999" id="cantidadSolicitada" onchange="calcularCosto()">
            </div>

            <div class="col-md-3">
                <label class="form-label">Costo estimado</label>
                <div class="input-group">
                    <span class="input-group-text">S/</span>
                    <input type="text" class="form-control" th:field="*{costoEstimado}"
                           id="costoEstimado" readonly>
                </div>
                <small class="form-text">Calculado autom&aacute;ticamente</small>
            </div>

            <div class="col-12">
                <label class="form-label">
                    Descripci&oacute;n <span class="text-danger">*</span>
                </label>
                <textarea class="form-control" th:field="*{descripcion}" rows="3"
                          placeholder="Describa el prop&oacute;sito y justificaci&oacute;n del expediente"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"></textarea>
                <div th:if="${#fields.hasErrors('descripcion')}" class="invalid-feedback">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:errors="*{descripcion}">Error</span>
                </div>
            </div>

            <div class="col-12 d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Crear expediente
                </button>
                <a th:href="@{/expedientes}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-lg"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <script>
        var necesidadesData = [];

        async function cargarNecesidades() {
            var actId = document.getElementById('actividadPoiId').value;
            var select = document.getElementById('necesidadPapId');
            select.innerHTML = '<option value="">Cargando...</option>';

            if (!actId) {
                select.innerHTML = '<option value="">Primero seleccione una actividad</option>';
                return;
            }

            try {
                var resp = await fetch('/expedientes/api/necesidades/por-actividad/' + actId);
                necesidadesData = await resp.json();
                select.innerHTML = '<option value="">Seleccione un item</option>';
                necesidadesData.forEach(function(n) {
                    select.innerHTML += '<option value="' + n.id
                        + '" data-precio="' + n.precioEstimado
                        + '" data-tipo="' + n.tipo
                        + '" data-disp="' + n.cantidadDisponible + '">'
                        + n.nombre + ' (S/ ' + parseFloat(n.precioEstimado).toFixed(2) + ') - Disp: ' + n.cantidadDisponible
                        + '</option>';
                });
                actualizarInfoPAP();
            } catch(e) {
                select.innerHTML = '<option value="">Error al cargar</option>';
            }
        }

        function actualizarInfoPAP() {
            var select = document.getElementById('necesidadPapId');
            var selected = select.options[select.selectedIndex];
            var tipo = selected.getAttribute('data-tipo');
            var disp = selected.getAttribute('data-disp');

            document.getElementById('disponibleInfo').textContent = disp
                ? 'Disponible: ' + disp : '';

            if (tipo) {
                document.getElementById('naturaleza').value = tipo;
            }
            calcularCosto();
        }

        function calcularCosto() {
            var select = document.getElementById('necesidadPapId');
            var selected = select.options[select.selectedIndex];
            var precio = selected ? parseFloat(selected.getAttribute('data-precio') || '0') : 0;
            var cant = parseInt(document.getElementById('cantidadSolicitada').value || '0');
            var total = precio * cant;
            document.getElementById('costoEstimado').value = total.toFixed(2);
        }

        document.addEventListener('DOMContentLoaded', function() {
            var actId = document.getElementById('actividadPoiId').value;
            if (actId) cargarNecesidades();
        });
    </script>

</div>
</body>
</html>
