<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Notas Modificatorias — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-pencil-square me-2 text-primary"></i>Notas Modificatorias
            </h4>
            <small class="text-muted">Solicitudes de modificaci&oacute;n presupuestal</small>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNota">
            <i class="bi bi-plus-lg"></i> Nueva solicitud
        </button>
    </div>

    <th:block th:if="${success}">
        <div class="alert alert-success alert-auto-close" role="alert"><span th:text="${success}">OK</span></div>
    </th:block>
    <th:block th:if="${error}">
        <div class="alert alert-danger alert-auto-close" role="alert"><span th:text="${error}">Error</span></div>
    </th:block>

    <div class="table-card">
        <div class="card-header">
            <h5><i class="bi bi-list me-2 text-primary"></i>Listado</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>C&oacute;digo</th>
                        <th>Solicitante</th>
                        <th>Tipo</th>
                        <th>Act. Existente</th>
                        <th>Nuevo Nombre</th>
                        <th class="text-end">Costo Ref.</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="n : ${notas}">
                        <td class="fw-medium" th:text="${n.codigo}">NM-123</td>
                        <td class="small" th:text="${n.solicitante.nombre}">Solicitante</td>
                        <td>
                            <span class="badge fs-85"
                                  th:classappend="${n.tipo.name() == 'inclusion_item'} ? 'bg-info text-dark' : 'bg-primary'"
                                  th:text="${n.tipo.name() == 'inclusion_item'} ? 'Incl. Item' : 'Incl. Actividad'">Tipo</span>
                        </td>
                        <td class="small" th:text="${n.actividadExistente.codigo}">POI-2.01</td>
                        <td class="small" th:text="${n.nuevoNombre}">Nuevo item</td>
                        <td class="text-end fw-medium"
                            th:text="${n.costoEstimadoReferencial != null ? 'S/ ' + #numbers.formatDecimal(n.costoEstimadoReferencial, 0, 'COMMA', 2, 'POINT') : '—'}">S/ 0</td>
                        <td>
                            <span class="badge fs-85"
                                  th:classappend="${n.estado.name() == 'pendiente'} ? 'bg-warning text-dark' : (${n.estado.name() == 'configurada'} ? 'bg-success' : 'bg-danger')"
                                  th:text="${n.estado}">pendiente</span>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end" sec:authorize="hasAnyRole('Administrador','Coordinacion')">
                                <button class="btn btn-sm btn-outline-success" th:if="${n.estado.name() == 'pendiente'}"
                                        data-bs-toggle="modal" data-bs-target="#modalConfigurar"
                                        th:onclick="'document.getElementById(\'configNotaId\').value=' + ${n.id}"
                                        title="Configurar">
                                    <i class="bi bi-check-lg"></i>
                                </button>
                                <form th:action="@{/notas/{id}/rechazar(id=${n.id})}" method="post" class="d-inline"
                                      th:if="${n.estado.name() == 'pendiente'}">
                                    <div class="input-group input-group-sm" style="width:180px">
                                        <input type="text" class="form-control form-control-sm" name="observacion"
                                               placeholder="Motivo..." required>
                                        <button class="btn btn-outline-danger btn-sm" type="submit" title="Rechazar">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(notas)}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-pencil-square fs-1 d-block mb-2"></i>
                            <p class="mb-2">No hay notas modificatorias</p>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalNota">
                                <i class="bi bi-plus-lg"></i> Crear primera
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL CREAR -->
    <div class="modal fade" id="modalNota" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/notas}" method="post" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h6 class="modal-title"><i class="bi bi-pencil-square me-2 text-primary"></i>Nueva Nota Modificatoria</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Tipo</label>
                            <select class="form-select" name="tipo" required>
                                <option th:each="t : ${tiposNota}" th:value="${t}"
                                        th:text="${t.name() == 'inclusion_item'} ? 'Inclusi\u00f3n de Item' : 'Inclusi\u00f3n de Actividad'">Tipo</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Actividad existente</label>
                            <select class="form-select" name="actividadExistenteId" required>
                                <option th:each="a : ${actividades}" th:value="${a.id}"
                                        th:text="${a.codigo + ' — ' + a.nombre}">POI-2.01</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Nombre del nuevo item/actividad</label>
                            <input class="form-control" name="nuevoNombre" required
                                   placeholder="Nombre del item o actividad a incluir">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Justificaci&oacute;n</label>
                            <textarea class="form-control" name="justificacion" rows="2" required
                                      placeholder="Explique la raz&oacute;n de la modificaci&oacute;n"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-medium text-muted">Costo estimado referencial (S/)</label>
                                <input type="number" class="form-control" name="costoEstimado" step="0.01"
                                       placeholder="0.00">
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-medium text-muted">Archivo sustento (PDF)</label>
                                <input type="file" class="form-control" name="archivo" accept="application/pdf">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-send"></i> Enviar solicitud</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIGURAR -->
    <div class="modal fade" id="modalConfigurar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/notas/0/configurar}" method="post" id="formConfigurar">
                    <div class="modal-header">
                        <h6 class="modal-title"><i class="bi bi-gear me-2 text-primary"></i>Configurar Nota</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="configNotaId">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Actividad origen (de donde sale el dinero)</label>
                            <select class="form-select" name="actividadOrigenId" required>
                                <option th:each="a : ${actividades}" th:value="${a.id}"
                                        th:text="${a.codigo + ' — ' + a.nombre}">POI-2.01</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Monto a transferir (S/)</label>
                            <input type="number" class="form-control" name="montoTransferir" required step="0.01"
                                   placeholder="0.00">
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-medium text-muted">Nuevo clasificador</label>
                                <input class="form-control" name="clasificadorGasto" placeholder="Ej: 2.3.1.1.1">
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-medium text-muted">Nuevo tipo</label>
                                <select class="form-select" name="tipo">
                                    <option th:each="t : ${naturalezas}" th:value="${t}" th:text="${t}">Bien</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted">Observaci&oacute;n</label>
                            <input class="form-control" name="observacion" placeholder="Notas adicionales">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success btn-sm"><i class="bi bi-check-lg"></i> Configurar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('modalConfigurar').addEventListener('show.bs.modal', function() {
            var notaId = document.getElementById('configNotaId').value;
            document.getElementById('formConfigurar').action = '/notas/' + notaId + '/configurar';
        });
    </script>

</div>
</body>
</html>
