<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Notificaciones — SISEXP-UPLA')}">
</head>
<body th:replace="~{layout :: layout(~{::#main-content})}">
<div id="main-content" th:fragment="content">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-bell me-2 text-primary"></i>Notificaciones
            </h4>
            <small class="text-muted">Centro de mensajes</small>
        </div>
        <form th:action="@{/notificaciones/marcar-todas}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-check-all"></i> Marcar todas como le&iacute;das
            </button>
        </form>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Mensaje</th>
                        <th>Tipo</th>
                        <th>Expediente</th>
                        <th>Fecha</th>
                        <th class="text-end">Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="n : ${notificaciones}" th:classappend="${!n.leida} ? 'table-active' : ''">
                        <td>
                            <div th:text="${n.mensaje}" th:classappend="${!n.leida} ? 'fw-medium' : ''">Mensaje</div>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${n.tipo.name() == 'aprobacion' or n.tipo.name() == 'nota_aprobada'} ? 'bg-success' : (${n.tipo.name() == 'rechazo' or n.tipo.name() == 'nota_rechazada'} ? 'bg-danger' : (${n.tipo.name() == 'observacion'} ? 'bg-warning text-dark' : (${n.tipo.name() == 'alerta_fecha'} ? 'bg-info text-dark' : 'bg-secondary')))"
                                  th:text="${n.tipo.name().replace('_',' ')}">info</span>
                        </td>
                        <td>
                            <th:block th:if="${n.expediente != null}">
                                <a th:href="@{/expedientes/{id}(id=${n.expediente.id})}"
                                   class="text-decoration-none fw-medium" th:text="${n.expediente.codigo}">EXP-0001</a>
                            </th:block>
                            <span th:if="${n.expediente == null}" class="text-muted">—</span>
                        </td>
                        <td class="small" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                        <td class="text-end">
                            <th:block th:if="${!n.leida}">
                                <form th:action="@{/notificaciones/{id}/leida(id=${n.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success" title="Marcar como le&iacute;da">
                                        <i class="bi bi-check-lg"></i>
                                    </button>
                                </form>
                            </th:block>
                            <span th:if="${n.leida}" class="text-success small">
                                <i class="bi bi-check-circle"></i> Le&iacute;da
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(notificaciones)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-bell-slash fs-1 d-block mb-2"></i>
                            <p class="mb-0">No hay notificaciones</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
