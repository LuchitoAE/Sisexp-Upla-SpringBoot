<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status} + ' — SISEXP-UPLA'">Error — SISEXP-UPLA</title>
    <link th:href="@{/vendor/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/vendor/bootstrap-icons.css}" rel="stylesheet">
    <style>
        :root {
            --radius-lg: 1rem;
            --shadow-login: 0 20px 60px rgba(0,0,0,.3);
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 1rem;
        }
        .error-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-login);
            text-align: center;
            animation: fadeUp .5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .error-card { animation: none; }
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #e2e8f0;
            line-height: 1;
            margin-bottom: .25rem;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .error-icon-404 { background: #fef3c7; color: #d97706; }
        .error-icon-403 { background: #fee2e2; color: #dc2626; }
        .error-icon-err { background: #fee2e2; color: #dc2626; }
        .error-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: .5rem;
        }
        .error-message {
            color: #64748b;
            margin-bottom: 1.5rem;
            font-size: .9rem;
            line-height: 1.5;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: 8px;
            padding: .6rem 1.5rem;
            font-weight: 600;
            transition: opacity .2s;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code" th:text="${status}">500</div>
        <div class="error-icon"
             th:classappend="${status == 404} ? 'error-icon-404' : (${status == 403} ? 'error-icon-403' : 'error-icon-err')">
            <i class="bi"
               th:classappend="${status == 404} ? 'bi-question-circle' : (${status == 403} ? 'bi-shield-lock' : 'bi-exclamation-triangle')"></i>
        </div>
        <div class="error-title" th:switch="${status}">
            <span th:case="403">Acceso denegado</span>
            <span th:case="404">P&aacute;gina no encontrada</span>
            <span th:case="*">Error inesperado</span>
        </div>
        <div class="error-message" th:switch="${status}">
            <span th:case="403">No tiene permisos para acceder a esta p&aacute;gina. Contacte al administrador si cree que es un error.</span>
            <span th:case="404">La p&aacute;gina que busca no existe o ha sido movida.</span>
            <span th:case="*">Ha ocurrido un error inesperado. Intente nuevamente m&aacute;s tarde.</span>
        </div>
        <a th:href="@{/dashboard}" class="btn btn-primary">
            <i class="bi bi-house"></i> Ir al inicio
        </a>
    </div>
</body>
</html>
